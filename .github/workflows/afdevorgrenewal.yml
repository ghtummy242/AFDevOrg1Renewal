name: Renew Agentforce Dev Org Lease UPD5 (20260206)
run-name: ${{ github.actor }} triggered dev org renewal build
#on: [push]
on:
  schedule:
    - cron:  '33 20 * * MON'
  workflow_dispatch:
jobs:
  dev-org-renew:
    runs-on: ubuntu-latest
    environment: AFDevOrg1Renewal
    steps:
      - uses: actions/checkout@v4
        with: 
          ref: main
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: 'Install CLI'
        run: npm install @salesforce/cli --location=global
      - run: sf --version
      - name: 'Authenticate to Agentforce org'
        run: |
            echo ${{ secrets.AGENTFORCE_DEV_ORG_URL }} > ./AGENTFORCE_DEV_ORG_URL.txt
            echo ${{ secrets.AGENTFORCE2_DEV_ORG_URL }} > ./AGENTFORCE2_DEV_ORG_URL.txt
            ls -al ./AGENTFORCE_DEV_ORG_URL.txt ./AGENTFORCE2_DEV_ORG_URL.txt
            sf org login sfdx-url -f ./AGENTFORCE_DEV_ORG_URL.txt -a AFDevOrg1Renewal -d
            sf org login sfdx-url -f ./AGENTFORCE2_DEV_ORG_URL.txt -a AFDevOrg2Renewal -d
      - name: 'Query data'
        run: |
            for ORG in AFDevOrg1Renewal AFDevOrg2Renewal
            do
              echo "Running query in org: $ORG"
              sf data query --query "select name from organization" -o $ORG
            done
